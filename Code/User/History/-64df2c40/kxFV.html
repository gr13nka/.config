<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w==" crossorigin="anonymous" referrerpolicy="no-referrer" />

	<style type="text/css">
		body {
			background-color: #999;
		}
		.bloccc {
			background-color: #fff;
			height: 300px;
			width: 350px;

			font-size: 14px;
			line-height: 1.42857143;
			color: #333;

			border-radius: 9px;
			box-shadow: 0 0 3px 1px rgba(0,0,0,0.1);
			margin: 20px;
			cursor: pointer;
		}
		.bloccc_top {
			height: 140px;
			background-color: #222;
			color: bisque;
			line-height: 1.4;
			display: flex;
			flex-direction: column;
			align-items: baseline;
			justify-content: center;
			padding: 10px;
			border-radius: 9px 9px 0 0;
		}
		.bloccc_top h3{
			margin: 0;
			font-size: 23px;
		}
		.block_cont_bottom {
			display: flex;
			flex-direction: column;
			align-items: baseline;
			justify-content: center;
			margin-left: 20px;
		}
		.block_cont_bottom h2 {
			margin: 0;
			margin-top: 5px;
			font-size: 25px;
		}
		.block_cont_bottom p {
			margin-top: 3px;
		}
		.btn {
			border: 2px solid #272727;
			border-radius: 60px;
			line-height: 1.1;
			font-weight: 700;
			font-size: 16px;
			padding: 10px 20px;
		}
		.bloccc:hover {
			transition: .5s;
			scale: 1.1;
		}
		.bloccc:hover .btn {
			background-color: #373737;
			color: bisque;
			transition: .3s;
		}
	</style>
	
</head>

<body>
	<div class="bloccc">
		<div class="bloccc_top">
			<h3>Подготовка</h2>
			<p>Всё о том как взять от интенсива максимум</p>
		</div>
		<div class="block_cont_bottom">
			<div class="block_bottom">
				<h2>Подготовка</h2>
				<p><b>6 уроков</b> Марина Полетаева</p>
			</div>
			<div class="btn">
				Открыть
			</div>
		</div>
	</div>
