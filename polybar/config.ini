[colors]
background = #ebdbb2
buffer = #4c566a
foreground = #282828
color1 = #ECEFF4
color2 = #8FBCBB
color3 = #88C0D0
color4 = #81A1C1
urgent = #BF616A
warning = #D08770
notify = #EBCB8B
success = #A3BE8C
function = #B48EAD
yellow = #d79921
blue = #458588
red = #cc241d
purple = #b16286
orange = #af3a03
aqua = #689d6a

[bar/mybar]
width = 100%
height = 30
enable-ipc = true
fixed-center = true
override-redirect = false
wm-restack = i3

border-size = 1
border-color = #00000000

foreground = ${colors.background}
background = ${colors.foreground}

modules-left = i3
modules-right = battery cpu date time poweroff

font-0 = Fira Code:style=bold:size=17;3
font-1 = M+ 1mn:style=bold:pixelsize=22;2
font-2 = Siji:pixelsize=17;1
font-3 = Font Awesome 5 Free Solid:pixelsize=17;2
font-4 = Font Awesome 5 Free:pixelsize=17;3
font-5 = Font Awesome 5 Brands:pixelsize=17;3
font-6 = FontAwesome:pixelsize=17;3
font-7 = Iosevka Nerd Font:style=Medium:size=17;3
font-8 = PowerlineSymbols:style=Medium:size=17;3

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
wrapping-scroll = false
focused = Active workspace on focused monitor
label-focused = п„‘
label-focused-foreground = ${colors.background}
label-focused-padding = 1

unfocused = Inactive workspace on any monitor
label-unfocused = п„Ң
label-unfocused-foreground = ${colors.background}
label-unfocused-padding = 1

urgent = Workspace with urgency hint set
label-urgent = п„Ң
;label-urgent = пҶ©
label-urgent-foreground = #ff586f
label-urgent-padding = 1


[module/date]
type = internal/date
date = "пҒі  %a, %d %b"
label =  %date%
label-background = ${colors.foreground}
;label-foreground = ${colors.red}
label-padding = 2


[module/time]
type = internal/date
;time = пҖ—  %r
time =%r
label = "%time%"
label-background = ${colors.foreground}
label-foreground = ${colors.yellow}
label-padding = 2


[module/memory]
type = internal/memory
interval = 2
#format-prefix = "пӢӣ "
label = п”ё %gb_used%
format-background = ${colors.foreground}
format-foreground = ${colors.blue}
format-padding = 2


[module/pulseaudio]
type = internal/pulseaudio
interval = 5
label-volume = "пҖЁ %percentage%%"
format-volume-foreground = ${colors.aqua}
format-volume-background = ${colors.foreground}
format-volume-padding = 2
label-muted = "пҖҰ 0%"
format-muted-foreground = ${colors.background}
format-muted-background = #e5746a
format-muted-padding = 2


[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "пӢӣ "
label = %percentage:2%%
;format-prefix = "оӮІ"
;format-prefix-background = ${colors.purple}
format-background = ${colors.foreground} 
;format-foreground = ${colors.purple}
format-padding = 2

[module/poweroff]
type=custom/script
format-prefix =  "пҖ‘ "
click-left = systemctl poweroff
click-right = systemctl restart

[module/network]
type = internal/network
interface = wlp2s0
#udspeed-minwidth = 3
label-connected = "  пҮ« %essid%  " 
label-connected-foreground = ${colors.background}
label-connected-background = ${colors.foreground}

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
full-at = 55
label-full = %percentage_raw%%
label-charging = %percentage_raw%%  
label-discharging = %percentage_raw%%  
format-full = пҮҰ <label-full>
format-charging = пҮҰ <label-charging>
format-discharging = <label-discharging>
format-discharing-padding = 2 
label-charging-padding = 2
label-full-padding = 2
